<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDH Flappy Tournament</title>
    <meta name="description" content="TDH Flappy Bird Tournament — A retro pixel-art PvP arcade game for workplace tournaments">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="fullscreen-prompt" onclick="goFullscreen()">⛶ CLICK FOR FULLSCREEN</div>
        <div id="loading-overlay">
            <div class="loading-text">LOADING...</div>
            <div class="loading-bar"><div class="loading-fill"></div></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/input.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/transitions.js"></script>
    <script src="js/background.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/bird.js"></script>
    <script src="js/pipes.js"></script>
    <script src="js/screens/mainMenu.js"></script>
    <script src="js/screens/charSelect.js"></script>
    <script src="js/screens/gameplay.js"></script>
    <script src="js/screens/pauseMenu.js"></script>
    <script src="js/screens/roundEnd.js"></script>
    <script src="js/screens/matchWinner.js"></script>
    <script src="js/screens/gameOverSP.js"></script>
    <script src="js/main.js"></script>

    <script>
        function goFullscreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
            document.getElementById('fullscreen-prompt').style.display = 'none';
        }

        // Hide loading overlay once font is loaded
        document.fonts.ready.then(() => {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }
        });
    </script>
</body>
</html>
